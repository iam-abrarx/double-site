<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assignment Site Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <style>
        .dashboard-container {
            width: 100%;
            max-width: 650px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            z-index: 2;
            animation: slideIn 0.5s ease forwards;
        }
        .hidden { display: none !important; }

        /* === VSS Countdown === */
        .vss-card { text-align: center; padding: 1.5rem 0; }
        .vss-container {
            position: relative;
            width: 150px; height: 150px;
            margin: 2rem auto;
            display: flex; align-items: center; justify-content: center;
        }
        .vss-ring {
            position: absolute; width: 100%; height: 100%;
            border-radius: 50%;
            border: 5px dashed rgba(16, 185, 129, 0.2);
            border-top: 5px solid var(--primary-color);
            animation: spin 4s linear infinite;
        }
        .vss-value {
            font-size: 3.5rem; font-weight: 800;
            color: var(--primary-color);
            text-shadow: 0 0 15px rgba(16, 185, 129, 0.3);
            z-index: 2;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

        /* === Done Screen === */
        .done-screen { text-align: center; padding: 2.5rem 1rem; }
        .done-icon {
            font-size: 4rem; margin-bottom: 1.5rem;
            filter: drop-shadow(0 0 20px rgba(16, 185, 129, 0.5));
        }
        .done-title {
            font-size: 2.8rem; font-weight: 800;
            color: var(--primary-color);
            text-shadow: 0 0 25px rgba(16, 185, 129, 0.3);
            margin-bottom: 0.75rem;
        }
        .done-sub {
            color: var(--text-secondary);
            font-size: 1.1rem; font-weight: 500;
        }
        .done-logout {
            margin-top: 2.5rem;
            background: rgba(244, 63, 94, 0.1);
            color: var(--error-color);
            border: 1px solid rgba(244, 63, 94, 0.2);
            width: 100%; padding: 0.85rem;
            border-radius: 12px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
            font-size: 0.95rem;
        }
        .done-logout:hover {
            background: var(--error-color); color: #fff;
            box-shadow: 0 4px 15px rgba(244, 63, 94, 0.3);
        }
    </style>
</head>
<body>
    <div class="glow-bg"></div>
    <main class="dashboard-container">
        <!-- VSS Countdown -->
        <div id="vssPanel" class="vss-card">
            <div style="font-size: 4.5rem; margin-bottom: 1rem; filter: drop-shadow(0 0 15px rgba(16, 185, 129, 0.4));">🛡️</div>
            <h1 style="font-size: 2rem; font-weight: 700; color: #fff; margin-bottom: 0.5rem;">Operation Successful</h1>
            <p style="color: var(--text-secondary); font-size: 0.95rem;">Evaluating Vulnerability Severity Score...</p>
            <div class="vss-container">
                <div class="vss-ring"></div>
                <div id="vssValue" class="vss-value">10</div>
            </div>
            <p id="vssStatus" style="color: var(--text-secondary); font-size: 0.9rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; animation: pulse 1.2s infinite; height: 1.5rem;">Scanning memory buffers...</p>
        </div>

        <!-- Done Screen -->
        <div id="doneScreen" class="done-screen hidden">
            <div class="done-icon">✅</div>
            <div class="done-title">DONE!</div>
            <div class="done-sub">Check bot for details</div>
            <button class="done-logout" onclick="window.location.href='/assignment/'">Logout</button>
        </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const vssValue = document.getElementById("vssValue");
            const vssStatus = document.getElementById("vssStatus");
            const vssPanel = document.getElementById("vssPanel");
            const doneScreen = document.getElementById("doneScreen");

            const statuses = [
                "Scanning memory buffers...",
                "Analyzing input streams...",
                "Running heuristic checks...",
                "Inspecting environment variables...",
                "Checking integrity signatures...",
                "Validating secure token...",
                "Verifying database checksums...",
                "Confirming backend alignment...",
                "Purging verification codes...",
                "Applying visual parameters...",
                "Clearance established."
            ];

            let score = 10;
            const timer = setInterval(() => {
                score--;
                vssValue.textContent = score;
                vssStatus.textContent = statuses[10 - score] || "Clearance established.";

                if (score === 0) {
                    clearInterval(timer);
                    setTimeout(() => {
                        vssPanel.classList.add("hidden");
                        doneScreen.classList.remove("hidden");
                    }, 500);
                }
            }, 400);
        });
    </script>
</body>
</html>
